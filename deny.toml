# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# Install: cargo install cargo-deny
# Run:     cargo deny check
# CI:      add `cargo deny check` to your workflow

[graph]
targets = []
all-features = true

# ── Licenses ────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

# ── Bans ────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"

# ── Advisories ──────────────────────────────────────────────────────
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# ── Sources ─────────────────────────────────────────────────────────
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
